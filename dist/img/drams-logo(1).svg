<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DRAMS - Digital Records Analysis & Monitoring System">
  <!--
    DRAMS logo (modernized)
    - Transparent background by default
    - Icon: hexagon + network nodes
    - Wordmark: DRAMS (kept as requested)
    - Tagline: Digital Records Analysis & Monitoring System
  -->

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D7FBF"/>
      <stop offset="100%" stop-color="#0B4F9C"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0B2A4A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Icon group -->
  <g transform="translate(70,60)" filter="url(#softShadow)">
    <!-- Hexagon outline -->
    <path
      d="M120 10 L200 56 L200 148 L120 194 L40 148 L40 56 Z"
      stroke="url(#blueGrad)"
      stroke-width="10"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Network edges -->
    <path d="M78 72 L122 52 L165 78 L150 128 L98 138 L78 72 Z"
          stroke="#0E5FAE" stroke-width="8" stroke-linejoin="round" fill="none" opacity="0.95"/>

    <path d="M122 52 L150 128"
          stroke="#0E5FAE" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

    <!-- Nodes -->
    <circle cx="78" cy="72" r="12" fill="#0B4F9C"/>
    <circle cx="122" cy="52" r="12" fill="#1D7FBF"/>
    <circle cx="165" cy="78" r="12" fill="#0B4F9C"/>
    <circle cx="150" cy="128" r="12" fill="#1D7FBF"/>
    <circle cx="98" cy="138" r="12" fill="#0B4F9C"/>

    <!-- Small highlight dots (adds "advanced" feel without clutter) -->
    <circle cx="78" cy="72" r="4" fill="#EAF4FF" opacity="0.85"/>
    <circle cx="122" cy="52" r="4" fill="#EAF4FF" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(320,72)">
    <!-- DRAMS text -->
    <text x="0" y="110"
          font-family="Poppins, Montserrat, Inter, Arial, sans-serif"
          font-size="120"
          font-weight="700"
          letter-spacing="2"
          fill="#0B4F9C">
      DRAMS
    </text>

    <!-- Tagline -->
    <text x="6" y="170"
          font-family="Inter, Source Sans 3, Arial, sans-serif"
          font-size="30"
          font-weight="500"
          letter-spacing="1.8"
          fill="#4B6575">
      Digital Records Analysis &amp; Monitoring System
    </text>
  </g>
</svg>